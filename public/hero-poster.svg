<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="poster-title">
  <title id="poster-title">LLM attack-surface graph — static poster</title>
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#12181B" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0A0E10" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgGrad)"/>

  <!-- baseline grid -->
  <g stroke="#1a2622" stroke-width="1" opacity="0.6">
    <line x1="0" y1="620" x2="1600" y2="620"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="0" y1="820" x2="1600" y2="820"/>
    <line x1="200" y1="500" x2="200" y2="900"/>
    <line x1="500" y1="500" x2="500" y2="900"/>
    <line x1="800" y1="500" x2="800" y2="900"/>
    <line x1="1100" y1="500" x2="1100" y2="900"/>
    <line x1="1400" y1="500" x2="1400" y2="900"/>
  </g>

  <!-- risk riser lines (nodes floating above baseline) -->
  <g stroke="#7CFFB0" stroke-width="1" opacity="0.25">
    <line x1="800" y1="720" x2="800" y2="480"/>
    <line x1="400" y1="720" x2="400" y2="380"/>
    <line x1="1200" y1="720" x2="1200" y2="360"/>
    <line x1="240" y1="720" x2="240" y2="420"/>
    <line x1="1360" y1="720" x2="1360" y2="410"/>
    <line x1="620" y1="720" x2="620" y2="330"/>
    <line x1="980" y1="720" x2="980" y2="350"/>
    <line x1="380" y1="720" x2="380" y2="580"/>
    <line x1="1050" y1="720" x2="1050" y2="530"/>
    <line x1="720" y1="720" x2="720" y2="600"/>
    <line x1="900" y1="720" x2="900" y2="640"/>
    <line x1="1180" y1="720" x2="1180" y2="470"/>
    <line x1="500" y1="720" x2="500" y2="440"/>
  </g>

  <!-- edges — trusted (green), boundary (cyan), hostile (red) -->
  <g stroke-width="1.4" opacity="0.55" fill="none">
    <!-- claude central -->
    <line x1="800" y1="480" x2="400" y2="380" stroke="#5AB0FF"/>
    <line x1="800" y1="480" x2="1200" y2="360" stroke="#5AB0FF"/>
    <line x1="800" y1="480" x2="240" y2="420" stroke="#5AB0FF"/>
    <line x1="800" y1="480" x2="1360" y2="410" stroke="#5AB0FF"/>
    <line x1="800" y1="480" x2="620" y2="330" stroke="#5AB0FF"/>
    <line x1="800" y1="480" x2="980" y2="350" stroke="#5AB0FF"/>
    <line x1="800" y1="480" x2="380" y2="580" stroke="#3A6E4E"/>
    <line x1="800" y1="480" x2="1050" y2="530" stroke="#3A6E4E"/>
    <line x1="800" y1="480" x2="720" y2="600" stroke="#3A6E4E"/>
    <line x1="800" y1="480" x2="900" y2="640" stroke="#5AB0FF"/>
    <line x1="800" y1="480" x2="1180" y2="470" stroke="#3A6E4E"/>
    <line x1="800" y1="480" x2="500" y2="440" stroke="#5AB0FF"/>
    <!-- hostile web to browser & search -->
    <line x1="240" y1="420" x2="620" y2="330" stroke="#FF6B6B" opacity="0.75"/>
    <line x1="240" y1="420" x2="500" y2="440" stroke="#FF6B6B" opacity="0.75"/>
    <!-- shell to fs -->
    <line x1="1200" y1="360" x2="1360" y2="410" stroke="#3A6E4E"/>
    <!-- github to mem -->
    <line x1="980" y1="350" x2="380" y2="580" stroke="#5AB0FF"/>
  </g>

  <!-- nodes -->
  <!-- model -->
  <g filter="url(#glow)">
    <circle cx="800" cy="480" r="16" fill="#7CFFB0"/>
    <circle cx="800" cy="480" r="30" fill="none" stroke="#7CFFB0" stroke-opacity="0.25"/>
  </g>
  <!-- mcp nodes (cyan) -->
  <g fill="#5AB0FF" filter="url(#glow)">
    <rect x="1188" y="348" width="24" height="24" transform="rotate(45 1200 360)"/>
    <rect x="608"  y="318" width="24" height="24" transform="rotate(45 620 330)"/>
    <rect x="968"  y="338" width="24" height="24" transform="rotate(45 980 350)"/>
    <rect x="888"  y="628" width="24" height="24" transform="rotate(45 900 640)"/>
  </g>
  <!-- data nodes (amber) -->
  <g fill="#FFD37A" filter="url(#glow)">
    <rect x="368" y="568" width="24" height="24" transform="rotate(45 380 580)"/>
    <rect x="1038" y="518" width="24" height="24" transform="rotate(45 1050 530)"/>
    <rect x="708"  y="588" width="24" height="24" transform="rotate(45 720 600)"/>
  </g>
  <!-- api nodes (violet) -->
  <g fill="#B583FF" filter="url(#glow)">
    <rect x="488"  y="428" width="24" height="24" transform="rotate(45 500 440)"/>
    <rect x="1168" y="458" width="24" height="24" transform="rotate(45 1180 470)"/>
  </g>
  <!-- shell (red) -->
  <g fill="#FF6B6B" filter="url(#glow)">
    <rect x="1348" y="398" width="24" height="24" transform="rotate(45 1360 410)"/>
  </g>
  <!-- user / hostile (pale + red-lit) -->
  <g fill="#E6EDE9" filter="url(#glow)">
    <circle cx="400" cy="380" r="10"/>
    <circle cx="240" cy="420" r="12" fill="#FF6B6B"/>
  </g>

  <!-- labels -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" fill="#6B7772" font-size="14">
    <text x="820" y="474">claude-sonnet-4.7</text>
    <text x="1218" y="358">shell MCP</text>
    <text x="638" y="326">filesystem MCP</text>
    <text x="998" y="346">github MCP</text>
    <text x="908" y="644">playwright MCP</text>
    <text x="240" y="404" text-anchor="middle" fill="#FF6B6B">fetched web page</text>
    <text x="400" y="368" text-anchor="middle">user prompt</text>
    <text x="1360" y="398" text-anchor="middle" fill="#FF6B6B">exec surface</text>
    <text x="380" y="600">agentdb</text>
    <text x="1050" y="550">memory</text>
    <text x="720" y="620">supabase</text>
    <text x="500" y="460">web-search</text>
    <text x="1180" y="490">figma</text>
  </g>

  <!-- top-left header -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7CFFB0" opacity="0.65">
    <text x="60" y="70" font-size="12">// attack-surface · static poster</text>
    <text x="60" y="92" font-size="12" fill="#6B7772">height &#8776; risk score</text>
  </g>

  <!-- legend -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#6B7772">
    <circle cx="1310" cy="66" r="5" fill="#7CFFB0"/><text x="1322" y="70">model</text>
    <circle cx="1380" cy="66" r="5" fill="#5AB0FF"/><text x="1392" y="70">MCP</text>
    <circle cx="1440" cy="66" r="5" fill="#FF6B6B"/><text x="1452" y="70">hostile</text>
    <circle cx="1510" cy="66" r="5" fill="#FFD37A"/><text x="1522" y="70">data</text>
  </g>
</svg>
